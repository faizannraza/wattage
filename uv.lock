[[package]]
name = "wattage"
version = "0.1.0"
source = { editable = "." }
dependencies = [
    { name = "numpy", version = "2.2.6", source = { registry = "https://pypi.org/simple" }, marker = "python_full_version < '3.11'" },
    { name = "numpy", version = "2.4.6", source = { registry = "https://pypi.org/simple" }, marker = "python_full_version == '3.11.*'" },
    { name = "numpy", version = "2.5.1", source = { registry = "https://pypi.org/simple" }, marker = "python_full_version >= '3.12'" },
    { name = "pydantic" },
    { name = "pydantic-settings" },
    { name = "pyyaml" },
    { name = "rich" },
    { name = "typer" },
]

[package.optional-dependencies]
dev = [
    { name = "hypothesis" },
    { name = "mypy" },
    { name = "pytest" },
    { name = "pytest-golden" },
    { name = "ruff" },
    { name = "types-pyyaml" },
]
docs = [
    { name = "mkdocs" },
    { name = "mkdocs-material" },
]
embeddings = [
    { name = "sentence-transformers" },
]
judge = [
    { name = "anthropic" },
]

[package.metadata]
requires-dist = [
    { name = "anthropic", marker = "extra == 'judge'", specifier = ">=0.30" },
    { name = "hypothesis", marker = "extra == 'dev'", specifier = ">=6.100" },
    { name = "mkdocs", marker = "extra == 'docs'", specifier = ">=1.6" },
    { name = "mkdocs-material", marker = "extra == 'docs'", specifier = ">=9.5" },
    { name = "mypy", marker = "extra == 'dev'", specifier = ">=1.11" },
    { name = "numpy", specifier = ">=1.26" },
    { name = "pydantic", specifier = ">=2.6" },
    { name = "pydantic-settings", specifier = ">=2.2" },
    { name = "pytest", marker = "extra == 'dev'", specifier = ">=8.0" },
    { name = "pytest-golden", marker = "extra == 'dev'", specifier = ">=0.2" },
    { name = "pyyaml", specifier = ">=6.0" },
    { name = "rich", specifier = ">=13.7" },
    { name = "ruff", marker = "extra == 'dev'", specifier = ">=0.6" },
    { name = "sentence-transformers", marker = "extra == 'embeddings'", specifier = ">=3.0" },
    { name = "typer", specifier = ">=0.12" },
    { name = "types-pyyaml", marker = "extra == 'dev'", specifier = ">=6.0" },
]
provides-extras = ["embeddings", "judge", "dev", "docs"]
